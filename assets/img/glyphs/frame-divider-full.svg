<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 28" fill="none" aria-hidden="true">
  <!-- frame-divider-full — horizontal ornament. Dotted tapered ends, thin lines, central botanical flourish with diamond. Uses currentColor so it tints per theme. -->

  <!-- Left tapered dots -->
  <circle cx="6"  cy="14" r="0.8" fill="currentColor" opacity="0.4"/>
  <circle cx="14" cy="14" r="1"   fill="currentColor" opacity="0.55"/>
  <circle cx="24" cy="14" r="1.2" fill="currentColor" opacity="0.7"/>

  <!-- Left line -->
  <line x1="34" y1="14" x2="164" y2="14" stroke="currentColor" stroke-width="0.8"/>

  <!-- Left leaf flourish -->
  <path d="M164 14 Q 170 10, 176 14 Q 170 18, 164 14 Z" fill="currentColor" opacity="0.85"/>

  <!-- Central diamond -->
  <path d="M178 14 L 183 8 L 188 14 L 183 20 Z" fill="currentColor"/>

  <!-- Right leaf flourish -->
  <path d="M190 14 Q 196 10, 202 14 Q 196 18, 190 14 Z" fill="currentColor" opacity="0.85"/>

  <!-- Right line -->
  <line x1="202" y1="14" x2="332" y2="14" stroke="currentColor" stroke-width="0.8"/>

  <!-- Right tapered dots -->
  <circle cx="342" cy="14" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="352" cy="14" r="1"   fill="currentColor" opacity="0.55"/>
  <circle cx="360" cy="14" r="0.8" fill="currentColor" opacity="0.4"/>
</svg>
